<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A0A1A; overflow: hidden; }
    canvas { display: block; }
    #slider-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: slideUp 0.2s ease-out;
    }
    #slider-container.active { display: flex; }
    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(20px); opacity: 0; }
      to   { transform: translateX(-50%) translateY(0);   opacity: 1; }
    }
    #field-slider { width: 200px; accent-color: #FF9800; }
    #vd-display {
      color: #66BB6A;
      font-family: monospace;
      font-size: 14px;
    }
    #formula-anchor {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      max-width: calc(100% - 32px);
      font-family: monospace;
      font-size: 12px;
      color: #D4D4D8;
      background: rgba(10,10,26,0.88);
      padding: 6px 12px;
      border-radius: 6px;
      display: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #border-flash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 3px solid transparent;
      border-radius: 2px;
      transition: border-color 80ms ease-out;
    }
    #border-flash.active { border-color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div id="border-flash"></div>
  <div id="formula-anchor"></div>
  <div id="slider-container">
    <input type="range" id="field-slider" min="1" max="20" value="5">
    <div id="vd-display">vd = 0.4 mm/s</div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="particle_field_renderer.js"></script>
</body>
</html>
