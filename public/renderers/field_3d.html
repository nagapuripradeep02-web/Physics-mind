<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin: 0; padding: 0; overflow: hidden; background: #0A0A1A; width: 100%; height: 100%; }
canvas { display: block; width: 100%; height: 100%; }
#legend { position: fixed; bottom: 8px; left: 8px; background: rgba(0,0,0,0.85); color: #D4D4D8; padding: 10px 14px; border-radius: 6px; font: 12px/1.5 monospace; z-index: 10; max-width: 280px; pointer-events: none; }
#caption { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #D4D4D8; padding: 8px 16px; border-radius: 8px; font: 14px/1.4 system-ui, sans-serif; z-index: 10; text-align: center; max-width: 80%; pointer-events: none; }
#mobile-fallback { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; background: #0A0A1A; }
</style>
</head><body>
<div id="caption"></div>
<div id="legend"></div>
<div id="mobile-fallback"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
<script src="field_3d_renderer.js"></script>
</body></html>
